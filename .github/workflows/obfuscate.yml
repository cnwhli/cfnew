name: Generate and Obfuscate Worker Script

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths: ['明文源吗']

jobs:
  build-and-obfuscate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Obfuscator
        run: npm install javascript-obfuscator

      - name: Obfuscate from local source file
        run: |
          cat > obfuscate.js << 'EOF'
          const JavaScriptObfuscator = require('javascript-obfuscator');
          const fs = require('fs');
          const path = require('path');
          
          const sourceFileName = '明文源吗';
          const outputFileName = '_worker.js';
          const sourceFilePath = path.join(process.cwd(), sourceFileName);

          // 1. 检查源文件
          if (!fs.existsSync(sourceFilePath)) {
            console.error('❌ 未找到源文件：', sourceFilePath);
            process.exit(1);
          }
          const originalCode = fs.readFileSync(sourceFilePath, 'utf8').trim();
          if (!originalCode) {
            console.error('❌ 源文件为空');
            process.exit(1);
          }

          // 2. 超强预处理：覆盖所有 window 引用场景（核心修复）
          let processedCode = originalCode
            // 覆盖：window.xxx → self.xxx
            .replace(/window\./g, 'self.')
            // 覆盖：window['xxx'] → self['xxx']
            .replace(/window\[(['"])/g, 'self[$1')
            // 覆盖：window["xxx"] → self["xxx"]
            .replace(/window\[(?!['"])/g, 'self[')
            // 覆盖：独立的 window（如 let a = window;）
            .replace(/\bwindow\b(?!\.)/g, 'self')
            // 覆盖：globalThis.window → self
            .replace(/globalThis\.window/g, 'self')
            // 覆盖：嵌套的 window（如 a.b.window → a.b.self）
            .replace(/(\w+)\.window/g, '$1.self')
            // 覆盖：Unicode 转义的 window（如 \u0077\u0069\u006E\u0064\u006F\u0077）
            .replace(/\\u0077\\u0069\\u006E\\u0064\\u006F\\u0077/g, 'self')
            // 覆盖：拆分字符串的 window（如 'win'+'dow'）
            .replace(/'win'\+'dow'/g, 'self')
            .replace(/"win"\+"dow"/g, 'self');

          // 3. 调试：输出预处理后的代码片段（查看 window 是否被替换）
          console.log('🔍 预处理后代码片段（前500字符）：');
          console.log(processedCode.substring(0, 500));
          if (processedCode.includes('window')) {
            console.warn('⚠️ 预处理后仍存在 window 引用，位置：');
            // 输出所有包含 window 的行
            processedCode.split('\n').forEach((line, idx) => {
              if (line.includes('window')) console.log(`行${idx+1}: ${line.trim()}`);
            });
          }

          // 4. 简化混淆配置（先保证运行，再逐步增强）
          const obfuscationOptions = {
              compact: true,
              controlFlowFlattening: false,
              deadCodeInjection: false,
              stringArray: false, // 临时关闭：避免编码后生成 window
              stringArrayEncoding: [],
              stringArrayThreshold: 0,
              stringArrayRotate: false,
              stringArrayShuffle: false,
              stringArrayWrappersCount: 0,
              renameGlobals: false,
              identifierNamesGenerator: 'mangled',
              identifiersPrefix: 'cf_',
              renameProperties: false,
              target: 'service-worker',
              numbersToExpressions: false,
              simplify: false,
              splitStrings: false, // 临时关闭：避免拆分字符串生成 window
              unicodeEscapeSequence: false, // 临时关闭：避免转义后隐藏 window
              disableConsoleOutput: true,
              reservedNames: ['self', 'globalThis', 'fetch', 'env']
          };

          // 5. 执行混淆
          let obfuscatedCode;
          try {
            obfuscatedCode = JavaScriptObfuscator.obfuscate(processedCode, obfuscationOptions).getObfuscatedCode();
          } catch (e) {
            console.error('❌ 混淆失败：', e.message);
            process.exit(1);
          }

          // 6. 强制检查：混淆后代码禁止包含 window
          if (obfuscatedCode.includes('window')) {
            console.error('❌ 混淆后代码仍存在 window 引用！');
            // 输出混淆后包含 window 的位置（方便定位）
            const windowPos = obfuscatedCode.indexOf('window');
            console.log('window 出现在位置', windowPos, '附近代码：');
            console.log(obfuscatedCode.substring(windowPos - 50, windowPos + 50));
            process.exit(1);
          }

          // 7. 写入文件
          fs.writeFileSync(outputFileName, obfuscatedCode, 'utf8');
          console.log('✅ 混淆完成，文件：', outputFileName);
          EOF
          
          # 执行混淆脚本
          node obfuscate.js

      - name: Commit and push
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add '_worker.js'
          if git diff --staged --quiet; then
            echo "ℹ️ 无变更，无需提交"
          else
            git commit -m "部署用这个"
            git push
          fi
